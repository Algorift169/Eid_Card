<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Eid Mubarak</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="eid-container">
        
        <div class="bg-pattern"></div>
        
        <div class="crescent-moon"></div>
        <div class="star-glow"></div>
        
        <div class="lantern lantern-1"></div>
        <div class="lantern lantern-2"></div>
        <div class="lantern lantern-3"></div>
        
       
        <div class="greeting-card">
            <div class="ornamental-top">
                <span class="ornament-diamond"></span>
                <span class="ornament-diamond"></span>
                <span class="ornament-diamond"></span>
            </div>
            
            <div class="greeting-content">
                <div class="arabic-calligraphy">عيد مبارك</div>
                <h1 class="eid-title">Eid Mubarak</h1>
                <div class="divider">
                    <span>✧</span>
                    <span>☾</span>
                    <span>✧</span>
                </div>
                <p class="blessing">May this blessed day bring you peace, joy, and endless blessings. Wishing you and your loved ones a celebration filled with love, harmony, and divine light.</p>
                <div class="wish-footer">
                    <span>✦</span>  Ramadan Kareem  <span>✦</span>
                </div>
            </div>
            
            <div class="ornamental-bottom">
                <span class="ornament-diamond"></span>
                <span class="ornament-diamond"></span>
                <span class="ornament-diamond"></span>
            </div>
        </div>
        
        <div class="particles">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>

        <div class="overlay-glow"></div>
    </div>
</body>
</html>
